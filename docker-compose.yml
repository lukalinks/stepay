services:
  postgres:
    image: postgres:16-alpine
    container_name: stepay-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stepay
    volumes:
      - stepay_pg_data:/var/lib/postgresql/data

volumes:
  stepay_pg_data:
